format_version: 3.0.0
name: proxmox
title: Proxmox VE
version: "0.0.1"
description: Retrieves logs and metrics from Proxmox Virtual Environment hosts
type: integration
categories:
  - observability
  - virtualization
conditions:
  kibana:
    version: ^8.9.0
icons:
  - src: /img/proxmox-logo.svg
    title: proxmox
    size: 400x60
    type: image/svg+xml
policy_templates:
  - name: proxmox
    title: Proxmox Logs and Metrics
    description: Collect Proxmox Logs and Metrics
    inputs:
      - type: httpjson
        title: "Collect Proxmox Logs and Metrics"
        description: "Collect Proxmox Logs and Metrics"
        vars:
          - name: hostname
            type: text
            title: Host API URL
            description: The API URL form the Proxmox host to be polled (ex. https://127.0.0.1:8006)
            multi: false
            required: true
            show_user: true
            default: https://127.0.0.1:8006
          - name: user
            type: text
            title: User
            description: Proxmox API user (ie. user@realm)
            multi: false
            required: true
            show_user: true
            default: root@pam
          - name: token_id
            type: text
            title: Token ID
            description: Proxmox API user Token ID
            multi: false
            required: true
            show_user: true
          - name: secret
            type: password
            title: Secret
            description: The secret UUID given by Proxmox when the API user was created
            multi: false
            required: true
            show_user: true
          - name: enable_request_tracer
            type: bool
            title: Enable request tracing
            description: The request tracer logs requests and responses to the agent's local file-system for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-httpjson.html#_request_tracer_filename) for details.
            multi: false
            required: false
            show_user: false
            default: false
          - name: ssl
            type: yaml
            title: SSL Configuration
            description: i.e. certificate_authorities, supported_protocols, verification_mode etc.
            multi: false
            required: false
            show_user: false
            default: |
