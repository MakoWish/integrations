---
description: Pipeline for parsing Proxmox VE cluster tasks
processors:
  ###################
  # Initial Parsing #
  ###################
  - set:
      field: ecs.version
      value: '8.9.0'
  - rename:
      field: message
      target_field: event.original
  - json:
      field: event.original
      target_field: proxmox
      ignore_failure: true

  #########################
  # Fingerprint Processor #
  #########################
  - fingerprint:
      fields:
        - proxmox.upid
        - proxmox.starttime
        - proxmox.status
      target_field: _id
      method: MD5
      ignore_missing: true
      tag: FIngerprint events

  #####################
  # ECS Event Parsing #
  #####################
  - rename:
      field: proxmox.starttime
      target_field: event.start
      ignore_missing: true
  - rename:
      field: proxmox.endtime
      target_field: event.end
      ignore_missing: true
  - date:
      if: ctx.event?.start != null
      field: event.start
      target_field: event.start
      formats: ["UNIX"]
      ignore_failure: true
  - date:
      if: ctx.event?.end != null
      field: event.end
      target_field: event.end
      formats: ["UNIX"]
      ignore_failure: true
  - script:
      lang: painless
      if: ctx.event?.start != null && ctx.event?.end != null
      source: >-
        Instant eventstart = ZonedDateTime.parse(ctx.event?.start).toInstant();
        Instant eventend = ZonedDateTime.parse(ctx.event?.end).toInstant();
        ctx.event['duration'] = ChronoUnit.NANOS.between(eventstart, eventend);

  ###################################
  # ECS Observer from Host Metadata #
  ###################################
  - remove:
      if: ctx.tags?.contains('forwarded')
      field: host.architecture
      ignore_missing: true
      tag: Remove host.architecture if forwarded
  - remove:
      if: ctx.tags?.contains('forwarded')
      field: host.containerized
      ignore_missing: true
      tag: Remove host.containerized if forwarded
  - remove:
      if: ctx.tags?.contains('forwarded')
      field: host.id
      ignore_missing: true
      tag: Remove host.id if forwarded
  - remove:
      if: ctx.tags?.contains('forwarded')
      field: host.os.codename
      ignore_missing: true
      tag: Remove host.os.codename if forwarded
  - rename:
      if: ctx.tags?.contains('forwarded')
      field: host
      target_field: observer
      ignore_missing: true
      tag: Rename host.* to observer.* if forwarded

  ####################
  # ECS User Parsing #
  ####################
  - gsub:
      if: ctx.proxmox?.user != null && ctx.proxmox.user != ''
      field: proxmox.user
      pattern: '@.*$'
      replacement: ''
      target_field: user.name
  - gsub:
      if: ctx.proxmox?.user != null && ctx.proxmox.user != ''
      field: proxmox.user
      pattern: '^.*@'
      replacement: ''
      target_field: user.domain

  ############
  # Clean Up #
  ############
  - remove:
      field:
      - proxmox.user
      - _temp
      ignore_missing: true
  - remove:
      if: ctx.tags == null || !(ctx.tags.contains('preserve_original_event'))
      field: event.original
      ignore_missing: true
  - script:
      description: Remove null/empty values recursively.
      lang: painless
      source: |-
        boolean drop(Object o) {
          if (o == null || o == '') {
            return true;
          } else if (o instanceof Map) {
            ((Map) o).values().removeIf(v -> drop(v));
            return (((Map) o).size() == 0);
          } else if (o instanceof List) {
            ((List) o).removeIf(v -> drop(v));
            return (((List) o).length == 0);
          }
          return false;
        }
        drop(ctx);

on_failure:
  - append:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: '{{{ _ingest.on_failure_message }}}'
